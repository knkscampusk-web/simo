<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>실모 일정 | 강남대성기숙 QUETTA</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --teal:#2BADA0;--teal-dark:#1e8c80;--teal-light:#e6f7f6;--teal-xlight:#f0faf9;
  --gold:#D4BE52;--gold-light:#fdf8e3;--gold-bg:#fffdf0;
  --sidebar-w:200px;--header-h:56px;
  --border:#e5e7eb;--txt:#111827;--txt-sub:#6b7280;
  --bg:#f3f4f6;--white:#fff;--red:#ef4444;--red-light:#fef2f2;
  --disabled-bg:#f7f8fa;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;}

/* LOCKSCREEN */
.lockscreen{position:fixed;inset:0;background:var(--teal);z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;}
.ls-logo{color:#fff;font-size:22px;font-weight:800;letter-spacing:-.5px;}
.ls-sub{color:rgba(255,255,255,.7);font-size:13px;margin-bottom:24px;}
.ls-box{background:#fff;border-radius:20px;padding:36px 40px;width:320px;box-shadow:0 20px 60px rgba(0,0,0,.2);text-align:center;}
.ls-box h2{font-size:16px;font-weight:800;margin-bottom:6px;}
.ls-box p{font-size:12px;color:var(--txt-sub);margin-bottom:20px;}
.pin-inp{width:100%;border:2px solid var(--border);border-radius:10px;padding:12px;font-size:32px;text-align:center;letter-spacing:16px;font-family:inherit;outline:none;background:#f9fafb;transition:border-color .15s;margin-bottom:14px;caret-color:transparent;}
.pin-inp:focus{border-color:var(--teal);background:#fff;}
.pin-err{color:var(--red);font-size:12px;font-weight:600;margin-bottom:10px;display:none;background:var(--red-light);padding:8px 12px;border-radius:6px;}
.pin-btn{width:100%;background:var(--teal);color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s;}
.pin-btn:hover{background:var(--teal-dark);}

/* HEADER */
.hdr{position:fixed;top:0;left:0;right:0;height:var(--header-h);background:var(--teal);z-index:300;display:flex;align-items:center;justify-content:space-between;padding:0 20px;box-shadow:0 2px 12px rgba(0,0,0,.2);}
.hdr-title{color:#fff;font-size:15px;font-weight:700;letter-spacing:-.3px;}
.hdr-sub{color:rgba(255,255,255,.7);font-size:11px;margin-top:1px;}
.hdr-right{display:flex;align-items:center;gap:8px;}
.save-chip{background:rgba(255,255,255,.15);color:#fff;font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;opacity:0;transition:opacity .3s;pointer-events:none;}
.save-chip.show{opacity:1;}
.hdr-btn{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;padding:6px 12px;border-radius:20px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;transition:all .2s;white-space:nowrap;}
.hdr-btn:hover{background:rgba(255,255,255,.25);}
.hdr-btn.gold{background:var(--gold);border-color:var(--gold);color:#333;}

/* SIDEBAR */
.sidebar{position:fixed;top:var(--header-h);left:0;bottom:0;width:var(--sidebar-w);background:var(--white);border-right:1px solid var(--border);overflow-y:auto;z-index:200;}
.sb-group{border-bottom:1px solid var(--border);}
.sb-label{display:flex;align-items:center;gap:7px;padding:10px 14px;font-size:11px;font-weight:700;color:#fff;letter-spacing:.6px;background:var(--teal);}
.sb-group:nth-child(2) .sb-label{background:#BA7517;}
.sb-group:nth-child(3) .sb-label{background:#1a7a70;}
.sb-item{display:flex;align-items:center;gap:8px;padding:9px 14px 9px 22px;cursor:pointer;font-size:13px;font-weight:500;color:var(--txt);border-left:3px solid transparent;transition:all .15s;user-select:none;}
.sb-item:hover{background:var(--teal-xlight);}
.sb-item.active{background:var(--teal-light);border-left-color:var(--teal);color:var(--teal);font-weight:700;}
.sb-dot{width:5px;height:5px;border-radius:50%;background:#d1d5db;flex-shrink:0;}
.sb-item.active .sb-dot{background:var(--teal);}

/* MAIN */
.main{margin-top:var(--header-h);margin-left:var(--sidebar-w);padding:24px;min-height:calc(100vh - var(--header-h));}
.content-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
.content-title{font-size:20px;font-weight:800;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.content-badge{font-size:12px;font-weight:600;color:var(--txt-sub);background:var(--border);padding:3px 10px;border-radius:20px;}
.head-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.legend{display:flex;gap:10px;align-items:center;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--txt-sub);}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;}

/* BUTTONS */
.action-btn{display:flex;align-items:center;gap:5px;border:1.5px solid var(--border);background:#fff;color:var(--txt);padding:7px 12px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;transition:all .15s;}
.action-btn:hover{border-color:var(--teal);color:var(--teal);}
.add-btn{display:flex;align-items:center;gap:6px;background:var(--teal);color:#fff;border:none;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit;transition:background .15s;}
.add-btn:hover{background:var(--teal-dark);}

/* ACADEMY TABS */
.ac-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.ac-tab{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;background:#fff;color:var(--txt);transition:all .15s;}
.ac-tab:hover{border-color:var(--teal);color:var(--teal);}
.ac-tab.active{background:var(--teal);border-color:var(--teal);color:#fff;}

/* TABLE */
.table-wrap{background:var(--white);border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.08);overflow:auto;}
table{width:100%;border-collapse:collapse;}
thead th{color:#fff;padding:10px 12px;font-size:11px;font-weight:700;text-align:center;white-space:nowrap;position:sticky;z-index:10;}
thead tr:first-child th{top:0;}
thead tr:nth-child(2) th{top:37px;}
thead.single-head th{background:var(--teal);}
th.gh-period{text-align:left;padding-left:16px;min-width:116px;}

tbody tr{border-bottom:1px solid #f0f1f3;}
tbody tr:last-child{border-bottom:none;}
tbody tr:nth-child(odd){background:#fff;}
tbody tr:nth-child(even){background:#f7fafa;}
tbody tr.g-first{border-bottom:none;}
tbody tr.g-odd{background:#fff !important;}
tbody tr.g-even{background:#f7fafa !important;}
tbody tr.row-current > td{background:var(--gold-bg) !important;}
tbody tr.g-odd.row-current > td,tbody tr.g-even.row-current > td{background:var(--gold-bg) !important;}
tbody tr:hover > td,tbody tr.g-first:hover > td,tbody tr.g-second:hover > td{background:var(--teal-xlight) !important;}

td{padding:9px 12px;font-size:12px;text-align:center;vertical-align:middle;}
td.td-period{text-align:left;padding-left:16px;white-space:nowrap;font-size:12px;color:var(--txt-sub);font-weight:500;min-width:116px;}
td.td-event{text-align:center;padding:9px 10px;min-width:134px;border-left:1px solid #f0f1f3;border-right:2px solid var(--teal-light);}
td.td-sess{font-size:13px;font-weight:700;color:var(--teal);white-space:nowrap;}
tr.g-second td.td-sess{color:#5bbab3;}
td.td-memo{min-width:90px;max-width:120px;}
td.disabled{background:var(--disabled-bg) !important;}
td.disabled-session{background:#f3f4f6 !important;color:#bbb;font-size:12px;font-style:italic;}

.event-badge{display:inline-flex;align-items:center;gap:4px;background:var(--gold-light);border:1px solid var(--gold);color:#7a6200;border-radius:10px;padding:2px 7px;font-size:10px;font-weight:700;white-space:nowrap;}
.current-badge{display:inline-flex;align-items:center;font-size:9px;font-weight:700;background:var(--teal);color:#fff;border-radius:8px;padding:1px 6px;margin-left:4px;vertical-align:middle;}
.date-val{font-size:12px;font-weight:600;color:#374151;}
.date-empty{color:#ffb3b3;font-size:11px;}

/* DATE INPUT */
.date-inp{width:100%;max-width:88px;border:1.5px solid var(--border);border-radius:6px;padding:4px 5px;font-size:11px;text-align:center;font-family:inherit;outline:none;background:#f9fafb;transition:all .15s;}
.date-inp:focus{border-color:var(--teal);background:#fff;box-shadow:0 0 0 2px rgba(43,173,160,.12);}
.date-inp::placeholder{color:#d1d5db;}
.date-inp.inp-empty{border-color:#fca5a5;background:#fff5f5;}
td.cell-empty .date-val,td.cell-empty{background:#fff8f8 !important;}

/* MEMO INPUT */
.memo-inp{width:100%;min-width:80px;border:1.5px solid var(--border);border-radius:6px;padding:4px 6px;font-size:11px;font-family:inherit;outline:none;background:#f9fafb;resize:none;}
.memo-inp:focus{border-color:var(--teal);background:#fff;}
.memo-txt{font-size:11px;color:var(--txt-sub);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

.del-btn{background:none;border:none;cursor:pointer;color:#d1d5db;font-size:13px;padding:3px 5px;border-radius:4px;}
.del-btn:hover{color:var(--red);}

/* EMPTY */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;color:var(--txt-sub);text-align:center;}
.empty-icon{font-size:52px;margin-bottom:16px;opacity:.5;}
.empty h3{font-size:17px;font-weight:700;margin-bottom:8px;color:var(--txt);}

/* MODALS */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:500;}
.modal{background:#fff;border-radius:16px;padding:32px;width:380px;box-shadow:0 20px 60px rgba(0,0,0,.2);max-height:90vh;overflow-y:auto;}
.modal h2{font-size:17px;font-weight:800;margin-bottom:6px;}
.modal p{color:var(--txt-sub);font-size:13px;margin-bottom:20px;line-height:1.5;}
.modal label{display:block;font-size:11px;font-weight:700;color:var(--txt-sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
.modal input,.modal select{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:14px;margin-bottom:12px;font-family:inherit;outline:none;background:#f9fafb;}
.modal input:focus,.modal select:focus{border-color:var(--teal);background:#fff;}
.modal-btns{display:flex;gap:8px;margin-top:8px;}
.btn-primary{flex:1;background:var(--teal);color:#fff;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-primary:hover{background:var(--teal-dark);}
.btn-secondary{background:var(--bg);color:var(--txt);border:none;border-radius:8px;padding:12px 18px;font-size:14px;cursor:pointer;font-family:inherit;}
.err-msg{color:var(--red);font-size:12px;font-weight:600;margin-bottom:10px;display:none;background:var(--red-light);padding:8px 12px;border-radius:6px;}

/* PRINT */
@media print{
  .lockscreen,.hdr,.sidebar,.head-right,.del-btn,.overlay{display:none!important;}
  .main{margin:0!important;padding:8px!important;}
  .table-wrap{box-shadow:none!important;}
  thead th{background:#2BADA0!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  tbody tr.row-current>td{background:#fffdf0!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
}
</style>
</head>
<body>

<!-- 잠금 화면 -->
<div class="lockscreen" id="lockscreen">
  <div class="ls-logo">📋 실모 컨텐츠 통합 일정</div>
  <div class="ls-sub">강남대성기숙 QUETTA</div>
  <div class="ls-box">
    <h2>🔐 PIN 입력</h2>
    <p>관리자 PIN 번호를 입력하세요</p>
    <input class="pin-inp" type="password" id="pinInput" maxlength="4"
      inputmode="numeric" pattern="[0-9]*" placeholder="••••"
      onkeydown="if(event.key==='Enter')submitPin()">
    <div class="pin-err" id="pinErr">PIN 번호가 올바르지 않습니다.</div>
    <button class="pin-btn" onclick="submitPin()">입력</button>
  </div>
</div>

<header class="hdr">
  <div>
    <div class="hdr-title">📋 실모 컨텐츠 통합 일정</div>
    <div class="hdr-sub">강남대성기숙 QUETTA</div>
  </div>
  <div class="hdr-right">
    <span class="save-chip" id="saveChip">✓ 저장됨</span>
    <button class="hdr-btn" onclick="printView()">🖨️ 인쇄</button>
    <button class="hdr-btn" onclick="exportExcel()">📥 엑셀</button>
    <button class="hdr-btn gold" onclick="lockApp()">🔒 잠금</button>
  </div>
</header>

<nav class="sidebar" id="sidebar"></nav>

<main class="main" id="main">
  <div class="empty">
    <div class="empty-icon">📚</div>
    <h3>컨텐츠를 선택하세요</h3>
    <p>좌측 사이드바에서 확인할 컨텐츠를 선택해주세요.</p>
  </div>
</main>

<!-- 회차 추가 (단일) -->
<div class="overlay" id="addModal" style="display:none">
  <div class="modal">
    <h2>➕ 회차 추가</h2>
    <p>새 회차 정보를 입력하세요.</p>
    <label>회차명</label>
    <input type="text" id="newName" placeholder="예: 18회차">
    <label>기간</label>
    <input type="text" id="newPeriod" placeholder="예: 11/10 ~ 11/16">
    <label>주요 일정 <span style="font-weight:400;text-transform:none">(선택)</span></label>
    <input type="text" id="newEvent" placeholder="예: 더프리미엄 모의고사" onkeydown="if(event.key==='Enter')confirmAddRow()">
    <div class="modal-btns">
      <button class="btn-secondary" onclick="closeAddModal()">취소</button>
      <button class="btn-primary" onclick="confirmAddRow()">추가</button>
    </div>
  </div>
</div>

<!-- 회차 추가 (통합) -->
<div class="overlay" id="addCombModal" style="display:none">
  <div class="modal">
    <h2 id="addCombTitle">➕ 회차 추가</h2>
    <p>추가할 컨텐츠와 회차 정보를 입력하세요.</p>
    <label>컨텐츠</label>
    <select id="combTarget"></select>
    <label>회차명</label>
    <input type="text" id="combName" placeholder="예: 15회차">
    <label>기간</label>
    <input type="text" id="combPeriod" placeholder="예: 11/10 ~ 11/16">
    <label>주요 일정 <span style="font-weight:400;text-transform:none">(선택)</span></label>
    <input type="text" id="combEvent" onkeydown="if(event.key==='Enter')confirmCombRow()">
    <div class="modal-btns">
      <button class="btn-secondary" onclick="closeCombModal()">취소</button>
      <button class="btn-primary" onclick="confirmCombRow()">추가</button>
    </div>
  </div>
</div>

<!-- 날짜 복사 모달 -->
<div class="overlay" id="copyModal" style="display:none">
  <div class="modal">
    <h2>📋 날짜 복사</h2>
    <p>선택한 학원의 날짜를 다른 학원으로 복사합니다.<br>기존에 입력된 날짜는 덮어씁니다.</p>
    <label>복사할 학원 (원본)</label>
    <select id="copyFrom"></select>
    <label>붙여넣을 학원 (대상)</label>
    <select id="copyTo"></select>
    <div class="modal-btns">
      <button class="btn-secondary" onclick="closeCopyModal()">취소</button>
      <button class="btn-primary" onclick="confirmCopy()">복사</button>
    </div>
  </div>
</div>

<script>
// ── Firebase ──────────────────────────────────────────────────────
var FIREBASE_CONFIG={
  apiKey:"AIzaSyCcs2qaSzYUArauolD1GDCQLSZVdkqCzkY",
  authDomain:"quetta-textbook.firebaseapp.com",
  projectId:"quetta-textbook",
  storageBucket:"quetta-textbook.firebasestorage.app",
  messagingSenderId:"897430870172",
  appId:"1:897430870172:web:3f9f4196dd6036a6ce7559"
};
var ADMIN_PIN="6688";
var db=null,firebaseReady=false;
try{
  firebase.initializeApp(FIREBASE_CONFIG);
  db=firebase.firestore();firebaseReady=true;
}catch(e){console.warn('Firebase 미설정');}

// ── 상수 ──────────────────────────────────────────────────────────
var ACADEMIES=['강대','S2','본원','위업','퀘타','의대관'];

// 전체 뷰용 컨텐츠 정의
var ALL_CONTENTS=[
  {id:'korean_gangmoK', label:'국어 강모K',   grouped:false, color:'#2BADA0', colorSub:'#1fa89b'},
  {id:'korean_igam',    label:'국어 이감',    grouped:false, color:'#BA7517', colorSub:'#854F0B'},

// ── 기본 데이터 ───────────────────────────────────────────────────
function ad(){return ACADEMIES.reduce(function(o,a){o[a]='';return o;},{});}
function mkS(prefix,arr){
  return arr.map(function(r,i){
    return {id:prefix+'_'+(i+1),name:r[0],period:r[1],event:r[2]||'',memo:'',academyDates:ad()};
  });
}
function mkS2(prefix,arr){
  var res=[];
  arr.forEach(function(r,i){
    res.push({id:prefix+'_'+(i*2+1),name:r[0],period:r[2],event:r[3]||'',memo:'',academyDates:ad()});
    res.push({id:prefix+'_'+(i*2+2),name:r[1],period:r[2],event:'',memo:'',academyDates:ad()});
  });
  return res;
}

// ── 날짜 헬퍼 ────────────────────────────────────────────────────
function autoFormatDate(val){
  val=val.trim();
  if(!val) return '';
  if(/[가-힣]/.test(val)) return val; // 한글(과제/수업/배부) 그대로
  if(/\(.\)/.test(val)) return val;   // 이미 포맷됨
  var m,d;
  var slash=val.match(/^(\d{1,2})[\/\-](\d{1,2})$/);
  if(slash){m=parseInt(slash[1]);d=parseInt(slash[2]);}
  else if(/^\d{3,4}$/.test(val)){
    if(val.length===3){m=parseInt(val[0]);d=parseInt(val.slice(1));}
    else{m=parseInt(val.slice(0,2));d=parseInt(val.slice(2));}
  }
  if(m&&d&&m>=1&&m<=12&&d>=1&&d<=31){
    var dt=new Date(2025,m-1,d);
    var days=['일','월','화','수','목','금','토'];
    return m+'/'+d+'('+days[dt.getDay()]+')';
  }
  return val;
}

function isCurrentPeriod(period){
  var m=period.match(/(\d+)\/(\d+)\s*~\s*(\d+)\/(\d+)/);
  if(!m) return false;
  var start=new Date(2025,parseInt(m[1])-1,parseInt(m[2]));
  var end=new Date(2025,parseInt(m[3])-1,parseInt(m[4]),23,59,59);
  var today=new Date();
  return today>=start&&today<=end;
}

// ── 사이드바 ──────────────────────────────────────────────────────
function renderSidebar(){
  var html='';
  SIDEBAR_CONFIG.forEach(function(g){
    html+='<div class="sb-group"><div class="sb-label">'+(g.emoji?g.emoji+' ':'')+g.label+'</div>';
    g.items.forEach(function(it){
      html+='<div class="sb-item'+(currentId===it.id?' active':'')+'" onclick="selectContent(\''+it.id+'\')">'
           +'<div class="sb-dot"></div>'+it.name+'</div>';
    });
    html+='</div>';
  });
  document.getElementById('sidebar').innerHTML=html;
}

function getSidebarItem(id){
  for(var i=0;i<SIDEBAR_CONFIG.length;i++)
    for(var j=0;j<SIDEBAR_CONFIG[i].items.length;j++)
      if(SIDEBAR_CONFIG[i].items[j].id===id) return SIDEBAR_CONFIG[i].items[j];
  return null;
}

// ── 컨텐츠 선택 ──────────────────────────────────────────────────
function selectContent(id){
  currentId=id; renderSidebar();
  document.getElementById('main').innerHTML='<div style="text-align:center;padding:60px;color:var(--txt-sub);">⏳ 불러오는 중...</div>';
  var it=getSidebarItem(id);
  if(!it) return;
  if(it.fullView){ loadAllData(function(){renderFullView();}); }
  else if(it.academy){ currentAcademy=it.academy; loadAllData(function(){renderAcademyView(it.academy);}); }
  else if(COMBINED_CONFIG[id]){ loadCombined(id); }
  else{ loadSingle(id); }
}

function rerender(){
  if(!currentId) return;
  var it=getSidebarItem(currentId);
  if(!it) return;
  if(it.fullView) renderFullView();
  else if(it.academy) renderAcademyView(it.academy);
  else if(COMBINED_CONFIG[currentId]) renderCombinedTable(currentId);
  else renderTable();
}

// ── 데이터 로드 ───────────────────────────────────────────────────
function fromStorage(id){
  var raw=localStorage.getItem('simmo_'+id);
  return raw?JSON.parse(raw):JSON.parse(JSON.stringify(DEFAULT_SESSIONS[id]||[]));
}
function fbGet(id,cb){
  if(firebaseReady&&db){
    db.collection('simmo_schedules').doc(id).get()
      .then(function(s){cb(s.exists&&s.data().sessions?s.data().sessions:fromStorage(id));})
      .catch(function(){cb(fromStorage(id));});
  }else cb(fromStorage(id));
}
function loadSingle(id){fbGet(id,function(s){currentSessions=s;renderTable();});}
function loadCombined(cid){
  var cfg=COMBINED_CONFIG[cid],done=0;combData={};
  cfg.parts.forEach(function(p){
    fbGet(p.id,function(s){combData[p.id]=s;if(++done===cfg.parts.length)renderCombinedTable(cid);});
  });
}
function loadAllData(cb){
  var ids=ALL_CONTENTS.map(function(c){return c.id;});
  var done=0; allData={};
  ids.forEach(function(id){
    fbGet(id,function(s){allData[id]=s;if(++done===ids.length)cb();});
  });
}

// ── 날짜/메모 셀 렌더 ────────────────────────────────────────────
function dateNavKey(e,el){
  var key=e.key;
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Enter','Tab'].indexOf(key)===-1) return;
  if(key==='Tab') return; // Tab은 기본 동작 유지
  e.preventDefault();
  var inputs=Array.from(document.querySelectorAll('.date-inp'));
  var idx=inputs.indexOf(el);
  if(idx===-1) return;
  var nAc=ACADEMIES.length;
  var next=-1;
  if(key==='ArrowRight'||key==='Enter') next=idx+1;
  else if(key==='ArrowLeft') next=idx-1;
  else if(key==='ArrowDown') next=idx+nAc;
  else if(key==='ArrowUp') next=idx-nAc;
  if(next>=0&&next<inputs.length){
    inputs[next].focus();
    inputs[next].select();
  }
}

function dateCell(val,onchangeStr,isGrouped){
  var isEmpty=!val;
  if(isAdmin){
    var cls='date-inp'+(isEmpty?' inp-empty':'');
    return '<td'+(isEmpty?' class="cell-empty"':'')+'>'
          +'<input class="'+cls+'" value="'+val+'" '
          +'onchange="'+onchangeStr+'" '
          +'onblur="autoFormatCell(this,\''+onchangeStr+'\')" '
          +'onkeydown="dateNavKey(event,this)" '
          +'placeholder="-"></td>';
  }
  return '<td'+(isEmpty?' class="cell-empty"':'')+'>'
        +'<span class="'+(val?'date-val':'date-empty')+'">'+(val||'미입력')+'</span></td>';
}
function autoFormatCell(el,onchangeStr){
  var fmt=autoFormatDate(el.value);
  if(fmt!==el.value){
    el.value=fmt;
    // trigger onchange
    var fn=new Function('event',onchangeStr.replace('this.value','"'+fmt+'"'));
    try{fn({});}catch(e){}
  }
  el.className='date-inp'+(fmt?'':' inp-empty');
}
function memoCell(val,onchangeStr){
  if(isAdmin) return '<td class="td-memo"><input class="memo-inp" value="'+val+'" onchange="'+onchangeStr+'" placeholder="메모"></td>';
  return '<td class="td-memo"><span class="memo-txt">'+(val||'')+'</span></td>';
}

function renderTable(){
  if(!currentId||COMBINED_CONFIG[currentId]) return;
  var it=getSidebarItem(currentId);
  var grouped=it&&it.groupByPeriod;
  var thAc=''; ACADEMIES.forEach(function(a){thAc+='<th>'+a+'</th>';});
  var rows='';

  if(grouped){
    var i=0,grpIdx=0;
    while(i<currentSessions.length){
      var s1=currentSessions[i];
      var s2=(i+1<currentSessions.length&&currentSessions[i+1].period===s1.period)?currentSessions[i+1]:null;
      var span=s2?2:1;
      var grpCls=grpIdx%2===0?'g-odd':'g-even';
      var isCur=isCurrentPeriod(s1.period);
      rows+='<tr class="g-first '+grpCls+(isCur?' row-current':'')+'">'
           +'<td class="td-period" rowspan="'+span+'">'+s1.period+(isCur?'<span class="current-badge">이번주</span>':'')+'</td>'
           +'<td class="td-event" rowspan="'+span+'">'+(s1.event?'<span class="event-badge">📌 '+s1.event+'</span>':'—')+'</td>'
           +'<td class="td-sess">'+s1.name+'</td>';
      ACADEMIES.forEach(function(ac){
        var val=(s1.academyDates&&s1.academyDates[ac])?s1.academyDates[ac]:'';
        rows+=dateCell(val,'updateDate('+i+',\''+ac+'\',this.value)');
      });
      rows+=memoCell(s1.memo||'','updateMemo('+i+',this.value)');
      rows+=isAdmin?'<td><button class="del-btn" onclick="deleteRow('+i+')">✕</button></td>':'<td></td>';
      rows+='</tr>';
      if(s2){
        i++;
        rows+='<tr class="g-second '+grpCls+(isCur?' row-current':'')+'">'
             +'<td class="td-sess">'+s2.name+'</td>';
        ACADEMIES.forEach(function(ac){
          var val=(s2.academyDates&&s2.academyDates[ac])?s2.academyDates[ac]:'';
          rows+=dateCell(val,'updateDate('+i+',\''+ac+'\',this.value)');
        });
        rows+=memoCell(s2.memo||'','updateMemo('+i+',this.value)');
        rows+=isAdmin?'<td><button class="del-btn" onclick="deleteRow('+i+')">✕</button></td>':'<td></td>';
        rows+='</tr>';
      }
      grpIdx++;i++;
    }
  } else {
    currentSessions.forEach(function(sess,idx){
      var isCur=isCurrentPeriod(sess.period);
      rows+='<tr'+(isCur?' class="row-current"':'')+'>'
           +'<td style="font-size:14px;font-weight:700;color:var(--teal);text-align:left;padding-left:18px;white-space:nowrap;">'+sess.name+'</td>'
           +'<td class="td-period">'+sess.period+(isCur?'<span class="current-badge">이번주</span>':'')+'</td>'
           +'<td class="td-event">'+(sess.event?'<span class="event-badge">📌 '+sess.event+'</span>':'—')+'</td>';
      ACADEMIES.forEach(function(ac){
        var val=(sess.academyDates&&sess.academyDates[ac])?sess.academyDates[ac]:'';
        rows+=dateCell(val,'updateDate('+idx+',\''+ac+'\',this.value)');
      });
      rows+=memoCell(sess.memo||'','updateMemo('+idx+',this.value)');
      rows+=isAdmin?'<td><button class="del-btn" onclick="deleteRow('+idx+')">✕</button></td>':'<td></td>';
      rows+='</tr>';
    });
  }

  var firstCols=grouped
    ?'<th style="text-align:left;padding-left:16px;min-width:116px;">기간</th><th style="min-width:134px;">주요일정</th><th style="min-width:80px;">회차</th>'
    :'<th style="text-align:left;padding-left:18px;min-width:96px;">회차</th><th style="min-width:116px;text-align:left;">기간</th><th style="min-width:134px;">주요일정</th>';

  var cnt=grouped?Math.ceil(currentSessions.length/2):currentSessions.length;
  var badge=grouped?(cnt+'주 · '+currentSessions.length+'회차'):(cnt+'회차');
  var name=it?it.name:'';

  document.getElementById('main').innerHTML=
    '<div class="content-head">'
    +'<div class="content-title">'+name+'<span class="content-badge">'+badge+'</span></div>'
    +'<div class="head-right">'
    +(isAdmin?'<button class="action-btn" onclick="openCopyModal(\''+currentId+'\')">📋 날짜 복사</button>':'')
    +(isAdmin?'<button class="add-btn" onclick="openAddModal()">+ 회차 추가</button>':'')
    +'</div></div>'
    +'<div class="table-wrap"><table>'
    +'<thead class="single-head"><tr>'+firstCols+thAc+'<th style="min-width:90px;">메모</th><th style="width:36px;"></th></tr></thead>'
    +'<tbody>'+rows+'</tbody></table></div>';
}

// ── 통합 테이블 렌더 ──────────────────────────────────────────────
function renderCombinedTable(cid){
  var cfg=COMBINED_CONFIG[cid];
  var primary=cfg.parts[cfg.primaryIdx];
  var periodMap={};
  (combData[primary.id]||[]).forEach(function(s,i){
    if(!periodMap[s.period]){periodMap[s.period]={event:s.event||'',_order:i};cfg.parts.forEach(function(p){periodMap[s.period][p.id]=null;});}
    periodMap[s.period][primary.id]=s;if(s.event)periodMap[s.period].event=s.event;
  });
  cfg.parts.forEach(function(part){
    if(part.id===primary.id) return;
    (combData[part.id]||[]).forEach(function(s,i){
      if(!periodMap[s.period]){periodMap[s.period]={event:s.event||'',_order:1000+i};cfg.parts.forEach(function(p){periodMap[s.period][p.id]=null;});}
      periodMap[s.period][part.id]=s;if(s.event&&!periodMap[s.period].event)periodMap[s.period].event=s.event;
    });
  });
  var periods=Object.keys(periodMap).sort(function(a,b){return periodMap[a]._order-periodMap[b]._order;});
  var nAc=ACADEMIES.length,cs=1+nAc;
  var h1='<th class="gh-period" rowspan="2" style="background:'+cfg.parts[0].color+'">기간</th>'
       +'<th rowspan="2" style="background:'+cfg.parts[0].colorSub+';min-width:134px;">주요일정</th>';
  cfg.parts.forEach(function(p){h1+='<th colspan="'+cs+'" style="background:'+p.color+'">'+p.label+'</th>';});
  var h2='';
  cfg.parts.forEach(function(p){
    h2+='<th style="background:'+p.colorSub+';min-width:80px;">회차</th>';
    ACADEMIES.forEach(function(a){h2+='<th style="background:'+p.colorSub+';min-width:80px;">'+a+'</th>';});
  });
  var rows='';
  periods.forEach(function(period){
    var row=periodMap[period];
    var isCur=isCurrentPeriod(period);
    rows+='<tr'+(isCur?' class="row-current"':'')+'>'
         +'<td class="td-period">'+period+(isCur?'<span class="current-badge">이번주</span>':'')+'</td>'
         +'<td class="td-event">'+(row.event?'<span class="event-badge">📌 '+row.event+'</span>':'—')+'</td>';
    cfg.parts.forEach(function(part){
      var sess=row[part.id];
      var si=sess?(combData[part.id]||[]).indexOf(sess):-1;
      if(sess){
        rows+='<td style="font-weight:700;color:'+part.color+';font-size:13px;white-space:nowrap;">'+sess.name+'</td>';
        ACADEMIES.forEach(function(ac){
          var val=(sess.academyDates&&sess.academyDates[ac])?sess.academyDates[ac]:'';
          rows+=dateCell(val,'updateCombDate(\''+cid+'\',\''+part.id+'\','+si+',\''+ac+'\',this.value)');
        });
      }else{
        rows+='<td class="disabled-session">—</td>';
        ACADEMIES.forEach(function(){rows+='<td class="disabled">—</td>';});
      }
    });
    rows+='</tr>';
  });
  var legend='<div class="legend">';
  cfg.parts.forEach(function(p){legend+='<div class="legend-item"><div class="legend-dot" style="background:'+p.color+'"></div>'+p.label+'</div>';});
  legend+='<div class="legend-item"><div class="legend-dot" style="background:var(--disabled-bg);border:1px solid var(--border)"></div>해당 없음</div></div>';
  document.getElementById('main').innerHTML=
    '<div class="content-head">'
    +'<div class="content-title">'+cfg.subject+'<span class="content-badge">'+cfg.parts.map(function(p){return p.label;}).join(' · ')+' 통합</span></div>'
    +'<div class="head-right">'+legend+(isAdmin?'<button class="add-btn" onclick="openCombModal(\''+cid+'\')">+ 회차 추가</button>':'')+'</div>'
    +'</div>'
    +'<div class="table-wrap"><table><thead><tr>'+h1+'</tr><tr>'+h2+'</tr></thead><tbody>'+rows+'</tbody></table></div>';
}

// ── 학원별 뷰 ────────────────────────────────────────────────────
function renderAcademyView(academy){
  currentAcademy=academy;
  // 기간 목록 수집 (이감 기준 + 나머지)
  var periodOrder={};var pIdx=0;
  ALL_CONTENTS.forEach(function(c){
    (allData[c.id]||[]).forEach(function(s){
      if(!periodOrder.hasOwnProperty(s.period)){periodOrder[s.period]=pIdx++;}
    });
  });
  var periods=Object.keys(periodOrder).sort(function(a,b){return periodOrder[a]-periodOrder[b];});

  // 기간별 이벤트 맵
  var eventMap={};
  ALL_CONTENTS.forEach(function(c){
    (allData[c.id]||[]).forEach(function(s){if(s.event&&!eventMap[s.period])eventMap[s.period]=s.event;});
  });

  // 컨텐츠별 기간→세션 맵
  var sessMap={};
  ALL_CONTENTS.forEach(function(c){
    sessMap[c.id]={};
    var byPeriod={};
    (allData[c.id]||[]).forEach(function(s){
      if(!byPeriod[s.period]) byPeriod[s.period]=[];
      byPeriod[s.period].push(s);
    });
    sessMap[c.id]=byPeriod;
  });

  // 헤더
  var thCols='';
  ALL_CONTENTS.forEach(function(c){
    thCols+=c.grouped
      ?'<th colspan="2" style="min-width:160px;">'+c.label+'</th>'
      :'<th style="min-width:80px;">'+c.label+'</th>';
  });

  var rows='';
  periods.forEach(function(period){
    var isCur=isCurrentPeriod(period);
    rows+='<tr'+(isCur?' class="row-current"':'')+'>'
         +'<td class="td-period">'+period+(isCur?'<span class="current-badge">이번주</span>':'')+'</td>'
         +'<td class="td-event">'+(eventMap[period]?'<span class="event-badge">📌 '+eventMap[period]+'</span>':'—')+'</td>';
    ALL_CONTENTS.forEach(function(c){
      var sessList=sessMap[c.id][period]||[];
      if(c.grouped){
        var s1=sessList[0],s2=sessList[1];
        var v1=s1&&s1.academyDates&&s1.academyDates[academy]?s1.academyDates[academy]:'';
        var v2=s2&&s2.academyDates&&s2.academyDates[academy]?s2.academyDates[academy]:'';
        rows+='<td><span class="'+(v1?'date-val':'date-empty')+'">'+(v1||'미입력')+'</span></td>';
        rows+='<td><span class="'+(v2?'date-val':'date-empty')+'">'+(v2||'미입력')+'</span></td>';
      }else{
        var s=sessList[0];
        var v=s&&s.academyDates&&s.academyDates[academy]?s.academyDates[academy]:'';
        rows+='<td><span class="'+(v?'date-val':'date-empty')+'">'+(v||'미입력')+'</span></td>';
      }
    });
    rows+='</tr>';
  });

  // 학원 탭
  var tabs='<div class="ac-tabs">';
  ACADEMIES.forEach(function(ac){
    tabs+='<button class="ac-tab'+(ac===academy?' active':'')+'" onclick="switchAcademy(\''+ac+'\')">'+ac+'</button>';
  });
  tabs+='</div>';

  document.getElementById('main').innerHTML=
    '<div class="content-head">'
    +'<div class="content-title">🏫 학원별 일정<span class="content-badge">'+academy+'</span></div>'
    +'</div>'+tabs
    +'<div class="table-wrap"><table>'
    +'<thead class="single-head"><tr>'
    +'<th style="text-align:left;padding-left:16px;min-width:116px;">기간</th>'
    +'<th style="min-width:134px;">주요일정</th>'
    +thCols+'</tr></thead>'
    +'<tbody>'+rows+'</tbody></table></div>';
}

function switchAcademy(academy){
  currentAcademy=academy;
  renderAcademyView(academy);
}

// ── 전체 일정표 뷰 ───────────────────────────────────────────────
function renderFullView(){
  // 기간 목록 수집
  var periodOrder={},pIdx=0;
  ALL_CONTENTS.forEach(function(c){
    (allData[c.id]||[]).forEach(function(s){
      if(!periodOrder.hasOwnProperty(s.period)) periodOrder[s.period]=pIdx++;
    });
  });
  var periods=Object.keys(periodOrder).sort(function(a,b){return periodOrder[a]-periodOrder[b];});

  // 이벤트 맵
  var eventMap={};
  ALL_CONTENTS.forEach(function(c){
    (allData[c.id]||[]).forEach(function(s){if(s.event&&!eventMap[s.period])eventMap[s.period]=s.event;});
  });

  // 컨텐츠별 기간→세션 맵
  var sessMap={};
  ALL_CONTENTS.forEach(function(c){
    var byPeriod={};
    (allData[c.id]||[]).forEach(function(s){
      if(!byPeriod[s.period]) byPeriod[s.period]=[];
      byPeriod[s.period].push(s);
    });
    sessMap[c.id]=byPeriod;
  });

  // 헤더 1행: 컨텐츠 그룹
  var h1='<th rowspan="2" style="text-align:left;padding-left:16px;min-width:116px;background:var(--teal);">기간</th>'
       +'<th rowspan="2" style="min-width:120px;background:var(--teal);">주요일정</th>';
  ALL_CONTENTS.forEach(function(c){
    h1+='<th colspan="'+ACADEMIES.length+'" style="background:'+c.color+';">'+c.label+'</th>';
  });

  // 헤더 2행: 학원명
  var h2='';
  ALL_CONTENTS.forEach(function(c){
    ACADEMIES.forEach(function(ac){
      h2+='<th style="background:'+c.colorSub+';min-width:70px;font-size:10px;">'+ac+'</th>';
    });
  });

  // 데이터 행
  var rows='';
  periods.forEach(function(period){
    var isCur=isCurrentPeriod(period);
    rows+='<tr'+(isCur?' class="row-current"':'')+'>'
         +'<td class="td-period">'+period+(isCur?'<span class="current-badge">이번주</span>':'')+'</td>'
         +'<td class="td-event">'+(eventMap[period]?'<span class="event-badge">📌 '+eventMap[period]+'</span>':'—')+'</td>';

    ALL_CONTENTS.forEach(function(c){
      var sessList=sessMap[c.id][period]||[];
      ACADEMIES.forEach(function(ac){
        if(c.grouped){
          // 수학/과학: 두 회차 날짜를 한 셀에 표시
          var v1=sessList[0]&&sessList[0].academyDates&&sessList[0].academyDates[ac]?sessList[0].academyDates[ac]:'';
          var v2=sessList[1]&&sessList[1].academyDates&&sessList[1].academyDates[ac]?sessList[1].academyDates[ac]:'';
          var bothEmpty=!v1&&!v2;
          rows+='<td'+(bothEmpty?' class="cell-empty"':'')+'>'
               +(v1?'<span class="date-val" style="display:block;">'+v1+'</span>':'<span class="date-empty" style="display:block;font-size:10px;">미입력</span>')
               +(v2?'<span class="date-val" style="display:block;color:#5bbab3;">'+v2+'</span>':'<span class="date-empty" style="display:block;font-size:10px;">미입력</span>')
               +'</td>';
        } else {
          var s=sessList[0];
          var v=s&&s.academyDates&&s.academyDates[ac]?s.academyDates[ac]:'';
          rows+='<td'+(v?'':' class="cell-empty"')+'>'
               +'<span class="'+(v?'date-val':'date-empty')+'">'+(v||'미입력')+'</span></td>';
        }
      });
    });
    rows+='</tr>';
  });

  document.getElementById('main').innerHTML=
    '<div class="content-head">'
    +'<div class="content-title">📋 전체 일정표<span class="content-badge">전 과목 · 전 학원</span></div>'
    +'</div>'
    +'<div class="table-wrap"><table>'
    +'<thead><tr>'+h1+'</tr><tr>'+h2+'</tr></thead>'
    +'<tbody>'+rows+'</tbody></table></div>';
}

// ── 날짜 업데이트 & 저장 ─────────────────────────────────────────
function updateDate(idx,ac,val){
  val=autoFormatDate(val);
  if(!currentSessions[idx].academyDates)currentSessions[idx].academyDates={};
  currentSessions[idx].academyDates[ac]=val;
  clearTimeout(saveTimer);saveTimer=setTimeout(function(){fbSave(currentId,currentSessions);},700);
}
function updateMemo(idx,val){
  currentSessions[idx].memo=val;
  clearTimeout(saveTimer);saveTimer=setTimeout(function(){fbSave(currentId,currentSessions);},700);
}
function updateCombDate(cid,partId,idx,ac,val){
  val=autoFormatDate(val);
  var sess=combData[partId];
  if(!sess||!sess[idx])return;
  if(!sess[idx].academyDates)sess[idx].academyDates={};
  sess[idx].academyDates[ac]=val;
  clearTimeout(saveTimer);saveTimer=setTimeout(function(){fbSave(partId,sess);},700);
}
function fbSave(id,sessions){
  if(!isAdmin)return;
  try{localStorage.setItem('simmo_'+id,JSON.stringify(sessions));}catch(e){}
  if(firebaseReady&&db)db.collection('simmo_schedules').doc(id).set({sessions:sessions}).catch(function(e){console.warn(e);});
  var chip=document.getElementById('saveChip');chip.classList.add('show');setTimeout(function(){chip.classList.remove('show');},2000);
}

// ── 행 삭제/추가 ─────────────────────────────────────────────────
function deleteRow(idx){
  if(!confirm('"'+currentSessions[idx].name+'" 회차를 삭제하시겠습니까?'))return;
  currentSessions.splice(idx,1);renderTable();fbSave(currentId,currentSessions);
}
function openAddModal(){document.getElementById('addModal').style.display='flex';}
function closeAddModal(){document.getElementById('addModal').style.display='none';}
function confirmAddRow(){
  var name=document.getElementById('newName').value.trim();
  var period=document.getElementById('newPeriod').value.trim();
  var event=document.getElementById('newEvent').value.trim();
  if(!name||!period){alert('회차명과 기간을 입력하세요.');return;}
  currentSessions.push({id:'c'+Date.now(),name:name,period:period,event:event,memo:'',academyDates:ad()});
  closeAddModal();['newName','newPeriod','newEvent'].forEach(function(x){document.getElementById(x).value='';});
  renderTable();fbSave(currentId,currentSessions);
}

var _combId=null;
function openCombModal(cid){
  _combId=cid;var cfg=COMBINED_CONFIG[cid];
  document.getElementById('addCombTitle').textContent='➕ '+cfg.subject+' 회차 추가';
  document.getElementById('combTarget').innerHTML=cfg.parts.map(function(p){return '<option value="'+p.id+'">'+p.label+'</option>';}).join('');
  document.getElementById('addCombModal').style.display='flex';
}
function closeCombModal(){document.getElementById('addCombModal').style.display='none';}
function confirmCombRow(){
  var pid=document.getElementById('combTarget').value;
  var name=document.getElementById('combName').value.trim();
  var period=document.getElementById('combPeriod').value.trim();
  var event=document.getElementById('combEvent').value.trim();
  if(!name||!period){alert('회차명과 기간을 입력하세요.');return;}
  if(!combData[pid])combData[pid]=[];
  combData[pid].push({id:'c'+Date.now(),name:name,period:period,event:event,memo:'',academyDates:ad()});
  closeCombModal();['combName','combPeriod','combEvent'].forEach(function(x){document.getElementById(x).value='';});
  fbSave(pid,combData[pid]);renderCombinedTable(_combId);
}

// ── 날짜 복사 ────────────────────────────────────────────────────
var _copyContentId=null;
function openCopyModal(contentId){
  _copyContentId=contentId;
  var opts=ACADEMIES.map(function(a){return '<option value="'+a+'">'+a+'</option>';}).join('');
  document.getElementById('copyFrom').innerHTML=opts;
  document.getElementById('copyTo').innerHTML=opts;
  document.getElementById('copyTo').selectedIndex=1;
  document.getElementById('copyModal').style.display='flex';
}
function closeCopyModal(){document.getElementById('copyModal').style.display='none';}
function confirmCopy(){
  var from=document.getElementById('copyFrom').value;
  var to=document.getElementById('copyTo').value;
  if(from===to){alert('원본과 대상 학원이 같습니다.');return;}
  var count=0;
  currentSessions.forEach(function(sess){
    if(!sess.academyDates)sess.academyDates={};
    sess.academyDates[to]=sess.academyDates[from]||'';
    count++;
  });
  closeCopyModal();
  renderTable();fbSave(currentId,currentSessions);
  alert(from+' → '+to+' 복사 완료 ('+count+'개 회차)');
}

// ── 엑셀 내보내기 ────────────────────────────────────────────────
function exportExcel(){
  if(typeof XLSX==='undefined'){alert('엑셀 라이브러리 로딩 중입니다. 잠시 후 다시 시도하세요.');return;}
  var table=document.querySelector('.table-wrap table');
  if(!table){alert('먼저 컨텐츠를 선택하세요.');return;}
  // input 값을 텍스트로 변환한 복사본 생성
  var clone=table.cloneNode(true);
  clone.querySelectorAll('input').forEach(function(inp){
    var td=inp.parentNode;
    td.innerHTML=inp.value||'';
  });
  clone.querySelectorAll('button').forEach(function(btn){btn.remove();});
  var wb=XLSX.utils.book_new();
  var ws=XLSX.utils.table_to_sheet(clone);
  XLSX.utils.book_append_sheet(wb,'일정표',ws);
  var title=document.querySelector('.content-title');
  var fname=(title?title.textContent.replace(/\s+/g,'_'):'simmo')+'_일정.xlsx';
  XLSX.writeFile(wb,fname);
}

// ── 인쇄 ─────────────────────────────────────────────────────────
function printView(){window.print();}

// ── 잠금화면 PIN 인증 ────────────────────────────────────────────
function submitPin(){
  var pin=document.getElementById('pinInput').value;
  var errEl=document.getElementById('pinErr');
  if(pin===ADMIN_PIN){
    isAdmin=true;
    document.getElementById('lockscreen').style.display='none';
    renderSidebar();
  }else if(pin.length===4){
    errEl.style.display='block';
    document.getElementById('pinInput').value='';
    document.getElementById('pinInput').focus();
    setTimeout(function(){errEl.style.display='none';},2000);
  }
}
function lockApp(){
  isAdmin=false;
  document.getElementById('lockscreen').style.display='flex';
  document.getElementById('pinInput').value='';
  setTimeout(function(){document.getElementById('pinInput').focus();},100);
}

// 초기 렌더
renderSidebar();
setTimeout(function(){document.getElementById('pinInput').focus();},100);
</script>
